name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm test
      # Deterministic correctness benchmarks as release gates (seeded, no timing
      # assertions). Latency lives in `pnpm bench` and is run locally, not gated in
      # CI — sub-ms assertions are unreliable on shared runners.
      - run: pnpm -r bench:gates
